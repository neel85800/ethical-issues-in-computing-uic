<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Seat Shuffle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f5f5;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    /* ── Page wrapper ── */
    .page {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 20px;
    }

    /* ── Header: title | controls bunched left | status indicator floated right ── */
    .header {
      display: flex;
      align-items: center;
      width: 100%;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      color: #222;
      margin-right: 32px;
      white-space: nowrap;
    }

    /* Controls sit together on the left; status indicator pushed to far right */
    .header-controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header label {
      font-size: 15px;
      color: #444;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header input[type="number"] {
      width: 80px;
      padding: 7px 10px;
      font-size: 15px;
      border: 1.5px solid #bbb;
      border-radius: 6px;
      text-align: center;
    }

    .header button {
      padding: 8px 22px;
      font-size: 15px;
      font-weight: 600;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .header button:hover {
      background: #555;
    }

    /* Shuffle status indicator (spinner → checkmark) — floated to far right */
    #shuffle-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      margin-left: auto;
    }

    #shuffle-status.status-loading::after {
      content: '';
      display: block;
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(0,0,0,0.12);
      border-top-color: #444;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    #shuffle-status.status-done::after {
      content: '✅';
      font-size: 18px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Footer ── */
    .footnotes {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 15px;
      font-size: 11px;
      color: #999;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #f5f5f5;
    }

    .footnotes a {
      color: #888;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .footnotes a:hover { text-decoration: underline; }

    .footnotes .gh-icon {
      width: 13px;
      height: 13px;
      fill: #888;
      flex-shrink: 0;
    }

    .header .paths-label {
      font-size: 15px;
      color: #444;
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      user-select: none;
      border: 1.5px solid #bbb;
      border-radius: 8px;
      padding: 7px 14px;
    }

    .header .paths-label input[type="checkbox"] {
      width: 17px;
      height: 17px;
      cursor: pointer;
      accent-color: #333;
    }

    /* ── Room container ── */
    .room {
      background: #fff;
      border: 2px solid #ccc;
      border-radius: 12px;
      padding: 32px 48px 48px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      width: fit-content;
      position: relative; /* needed for SVG overlay */
    }

    /* ── Front wall: screens only ── */
    .front-wall {
      display: flex;
      justify-content: center;
    }

    .screens {
      display: flex;
      gap: 48px;
    }

    .projector-screen {
      background: #d0d0d0;
      color: #444;
      font-size: 16px;
      font-weight: 500;
      padding: 10px 0;
      width: 300px;
      text-align: center;
      border-radius: 4px;
    }

    /* ── Main area: left panels + tables ── */
    .main-area {
      display: flex;
      gap: 40px;
      align-items: stretch;
    }

    /* ── Left-wall blue panels ── */
    /* Grid mirrors the 3 table rows; one panel per row */
    .left-panels {
      display: grid;
      grid-template-rows: repeat(3, 280px);
      row-gap: 64px;
      align-items: center;
    }

    .blue-panel {
      width: 36px;
      height: 180px;
      border: 5px solid #1a8fff;
      border-radius: 4px;
      background: transparent;
    }

    .blue-panel:nth-child(1) { grid-row: 1; }
    .blue-panel:nth-child(2) { grid-row: 2; }
    .blue-panel:nth-child(3) { grid-row: 3; }

    /* ── Table grid ── */
    .tables-area {
      display: flex;
      flex-direction: column;
      gap: 64px;
    }

    .table-row {
      display: flex;
      gap: 64px;
      align-items: center;
    }

    .table {
      width: 200px;
      height: 280px;
      background: #555;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .table-num {
      text-align: center;
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 0 6px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .table-seats {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 4px;
      padding: 6px;
    }

    .seat {
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 36px;
      font-weight: 500;
    }

    /* Lectern cell holds the same column width as a table so cols align */
    .lectern-cell {
      width: 200px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Lectern sits in the "0" slot (top-left of the table grid) */
    .lectern {
      width: 140px;
      height: 140px;
      background: #d8d8d8;
      color: #555;
      font-size: 15px;
      font-weight: 500;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transform: rotate(-10deg);
    }
  </style>
</head>
<body>

  <div class="page">

  <!-- Header -->
  <div class="header">
    <h1>Visual Seat Shuffle</h1>
    <div class="header-controls">
      <label>Seed (0–1000) <input type="number" id="seed" min="0" max="1000"></label>
      <button id="shuffle-btn">🔀 Shuffle</button>
      <label class="paths-label"><input type="checkbox" id="paths-cb"> Draw Paths</label>
    </div>
    <span id="shuffle-status"></span>
  </div>

  <div class="room">

    <!-- Front wall: screens only -->
    <div class="front-wall">
      <div class="screens">
        <div class="projector-screen">Projector Screen</div>
        <div class="projector-screen">Projector Screen</div>
      </div>
    </div>

    <!-- Main area -->
    <div class="main-area">

      <!-- Left wall panels (one per row) -->
      <div class="left-panels">
        <div class="blue-panel"></div>
        <div class="blue-panel"></div>
        <div class="blue-panel"></div>
      </div>

      <!-- Tables -->
      <div class="tables-area">
        <div class="table-row">
          <div class="lectern-cell"><div class="lectern">Lectern thing</div></div>
          <div class="table">
            <div class="table-num">Table 1</div>
            <div class="table-seats">
              <div class="seat"></div><div class="seat"></div>
              <div class="seat"></div><div class="seat"></div>
            </div>
          </div>
          <div class="table">
            <div class="table-num">Table 2</div>
            <div class="table-seats">
              <div class="seat"></div><div class="seat"></div>
              <div class="seat"></div><div class="seat"></div>
            </div>
          </div>
        </div>
        <div class="table-row">
          <div class="table">
            <div class="table-num">Table 3</div>
            <div class="table-seats">
              <div class="seat"></div><div class="seat"></div>
              <div class="seat"></div><div class="seat"></div>
            </div>
          </div>
          <div class="table">
            <div class="table-num">Table 4</div>
            <div class="table-seats">
              <div class="seat"></div><div class="seat"></div>
              <div class="seat"></div><div class="seat"></div>
            </div>
          </div>
          <div class="table">
            <div class="table-num">Table 5</div>
            <div class="table-seats">
              <div class="seat"></div><div class="seat"></div>
              <div class="seat"></div><div class="seat"></div>
            </div>
          </div>
        </div>
        <div class="table-row">
          <div class="table">
            <div class="table-num">Table 6</div>
            <div class="table-seats">
              <div class="seat"></div><div class="seat"></div>
              <div class="seat"></div><div class="seat"></div>
            </div>
          </div>
          <div class="table">
            <div class="table-num">Table 7</div>
            <div class="table-seats">
              <div class="seat"></div><div class="seat"></div>
              <div class="seat"></div><div class="seat"></div>
            </div>
          </div>
          <div class="table">
            <div class="table-num">Table 8</div>
            <div class="table-seats">
              <div class="seat"></div><div class="seat"></div>
              <div class="seat"></div><div class="seat"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div><!-- .room -->
  </div><!-- .page -->
  <script src="shuffle.js"></script>

</body>
